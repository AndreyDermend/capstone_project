# Template — DO NOT commit real secrets. Create the real secret with:
#
#   kubectl -n lexiagent create secret generic lexiagent-secrets \
#       --from-literal=ANTHROPIC_API_KEY="sk-ant-..." \
#       --from-literal=LEXIAGENT_API_KEY=""
#
# Then skip applying this file.
apiVersion: v1
kind: Secret
metadata:
  name: lexiagent-secrets
  namespace: lexiagent
type: Opaque
stringData:
  # Required when LLM_PROVIDER=anthropic. Leave empty otherwise.
  ANTHROPIC_API_KEY: ""
  # Optional bearer token for /v1/* routes. Empty = no auth (trusted-network only).
  LEXIAGENT_API_KEY: ""
