# Optional in-cluster Ollama. Skip this file and point OLLAMA_HOST in the
# ConfigMap at a host-level Ollama if you already have one (e.g. a GPU node).
#
# After applying, pull the models into the running pod:
#   kubectl -n lexiagent exec deploy/ollama -- ollama pull qwen3:4b
#   kubectl -n lexiagent exec deploy/ollama -- ollama pull nomic-embed-text
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: lexiagent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: lexiagent
  labels:
    app: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - name: http
              containerPort: 11434
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: lexiagent
spec:
  type: ClusterIP
  selector:
    app: ollama
  ports:
    - name: http
      port: 11434
      targetPort: http
