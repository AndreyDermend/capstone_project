apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data
  namespace: lexiagent
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: lexiagent
  labels:
    app: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OPENAI_API_BASE_URL
              value: "http://lexiagent:8001/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lexiagent-secrets
                  key: LEXIAGENT_API_KEY
                  optional: true
            - name: WEBUI_AUTH
              value: "False"
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-webui-data
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: lexiagent
spec:
  type: NodePort
  selector:
    app: open-webui
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30000
